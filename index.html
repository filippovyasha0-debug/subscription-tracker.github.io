<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubEnd</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="apple-icon.png">
    <meta name="theme-color" content="#00d4aa">
    <link rel="manifest" href="manifest.json">
    <!-- Chart.js для графика -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --border: #2a2a4a;
            --text: #e0e0e0;
            --text-secondary: #a0a0b0;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --warning: #ff9f43;
            --danger: #ff6b6b;
            --btn-secondary-bg: #3a3a5a;
            --btn-secondary-hover: #4a4a6a;
            --input-bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --stat-bg: #1a1a2e;
            --shadow: rgba(0,0,0,0.3);
        }
        body.light-theme {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #d0d0d0;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --accent: #009b7d;
            --accent-hover: #007a63;
            --warning: #d97706;
            --danger: #cc0000;
            --btn-secondary-bg: #e0e0e0;
            --btn-secondary-hover: #c0c0c0;
            --input-bg: #ffffff;
            --card-bg: #ffffff;
            --stat-bg: #ffffff;
            --shadow: rgba(0,0,0,0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        /* Header */
        header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:30px; flex-wrap:wrap; gap:15px;
        }
        header h1 { font-size:2.5rem; color:var(--text); }
        .auth-buttons { display:flex; gap:10px; align-items:center; }
        .theme-toggle, .auth-btn {
            background: var(--surface); border:1px solid var(--border);
            border-radius:50px; padding:8px 16px; cursor:pointer;
            font-size:1.2rem; color:var(--text);
            box-shadow: 0 2px 8px var(--shadow);
            transition: background 0.3s; display:flex; align-items:center; gap:6px;
        }
        .theme-toggle:hover, .auth-btn:hover { background: var(--btn-secondary-hover); }

        /* Stats */
        .stats { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-bottom:30px; }
        .stat-card {
            background: var(--stat-bg); padding:15px 25px; border-radius:12px;
            text-align:center; min-width:200px; box-shadow: 0 4px 15px var(--shadow);
            border:1px solid var(--border);
        }
        .stat-label { display:block; font-size:0.9rem; color:var(--text-secondary); margin-bottom:5px; }
        .stat-value { font-size:2rem; font-weight:bold; color:var(--accent); }

        /* Формы */
        .form-section {
            background: var(--surface); padding:25px; border-radius:16px;
            margin-bottom:30px; box-shadow: 0 4px 20px var(--shadow); border:1px solid var(--border);
        }
        .form-section h2 { margin-bottom:20px; color:var(--text); font-size:1.5rem; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; margin-bottom:5px; font-weight:500; color:var(--text-secondary); }
        .form-group input, .form-group select {
            width:100%; padding:12px; border:1px solid var(--border); border-radius:8px;
            background: var(--input-bg); color:var(--text); font-size:1rem; transition: border 0.3s;
        }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); }
        .date-picker-wrapper { position:relative; width:100%; }
        .date-display {
            display:flex; align-items:center; gap:10px; width:100%;
            padding:12px; background: var(--input-bg); border:1px solid var(--border);
            border-radius:8px; color:var(--text); font-size:1rem;
            transition: border 0.3s; cursor:pointer; user-select:none;
        }
        .date-display:hover { border-color:var(--accent); }
        .date-display.active { border-color:var(--accent); }
        .date-text { flex:1; color:var(--text-secondary); }
        .date-text.selected { color:var(--text); }
        .clear-date {
            display:none; background:none; border:none; color:var(--danger);
            font-size:1.2rem; cursor:pointer; padding:0 5px; flex-shrink:0; z-index:2;
        }
        .clear-date.visible { display:block; }
        #next_payment_date {
            position:absolute; top:0; left:0; width:100%; height:100%;
            opacity:0; cursor:pointer; z-index:1;
        }
        .form-actions { display:flex; gap:10px; margin-top:15px; }
        .btn {
            padding:12px 24px; border:none; border-radius:8px; font-size:1rem;
            cursor:pointer; transition: background 0.3s, transform 0.1s; font-weight:600;
        }
        .btn:active { transform:scale(0.98); }
        .btn-primary { background:var(--accent); color:#0f0f1a; }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn-secondary { background:var(--btn-secondary-bg); color:var(--text); }
        .btn-secondary:hover { background:var(--btn-secondary-hover); }
        .btn-sm { padding:8px 12px; font-size:0.9rem; }
        .btn-paid { background:var(--accent); color:#0f0f1a; margin-right:5px; }
        .btn-paid:hover { background:var(--accent-hover); }
        .btn-edit { background:var(--btn-secondary-bg); color:var(--text); margin-right:5px; }
        .btn-edit:hover { background:var(--btn-secondary-hover); }
        .btn-delete { background:#6b2c2c; color:#fff; }
        .btn-delete:hover { background:#9a3e3e; }
        .errors { margin-top:10px; color:var(--danger); font-size:0.9rem; }

        /* Подписки */
        .subscriptions-section h2 { font-size:1.5rem; margin-bottom:20px; color:var(--text); }
        .subscriptions-grid {
            display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap:20px; margin-bottom:40px;
        }
        .subscription-card {
            background: var(--card-bg); border-radius:12px; padding:20px;
            box-shadow: 0 4px 15px var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
            position:relative; display:flex; flex-direction:column; border:1px solid var(--border);
        }
        .subscription-card:hover { transform:translateY(-3px); box-shadow: 0 8px 25px var(--shadow); }
        .subscription-card.near-warning { border:2px solid var(--warning); }
        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px; }
        .card-header h3 { font-size:1.3rem; color:var(--text); word-break:break-word; }
        .category-badge {
            background: var(--btn-secondary-bg); color: var(--text-secondary);
            padding:3px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; white-space:nowrap;
        }
        .frequency-badge {
            background: var(--btn-secondary-bg); color: var(--text-secondary);
            padding:3px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; white-space:nowrap;
            margin-left:5px;
        }
        .card-body { flex:1; }
        .cost { font-size:1.8rem; font-weight:bold; color:var(--accent); margin-bottom:10px; }
        .next-date { color:var(--text-secondary); font-size:0.95rem; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
        .days-left { margin-left:8px; font-weight:600; }
        .days-left.today { color:var(--accent); }
        .days-left.soon { color:var(--warning); }
        .card-actions { margin-top:15px; display:flex; flex-wrap:wrap; gap:5px; }

        /* История */
        .history-section {
            background: var(--surface); padding:25px; border-radius:16px;
            box-shadow: 0 4px 20px var(--shadow); border:1px solid var(--border);
            margin-bottom:30px;
        }
        .history-section h2 { margin-bottom:15px; color:var(--text); font-size:1.5rem; }
        .history-list { width:100%; border-collapse:collapse; }
        .history-list th, .history-list td {
            padding:12px 8px; text-align:left; border-bottom:1px solid var(--border); color:var(--text);
        }
        .history-list th { color:var(--text-secondary); font-weight:500; }
        .empty-history { color:var(--text-secondary); text-align:center; padding:20px; }
        .btn-clear-history {
            background: var(--btn-secondary-bg); color:var(--text);
            border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-top:15px;
        }
        .empty-state { text-align:center; padding:40px; background:var(--surface); border-radius:12px; color:var(--text-secondary); font-size:1.1rem; }

        /* Модалка */
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:1000;
        }
        .modal.active { display:flex; }
        .modal-content {
            background: var(--surface); padding:30px; border-radius:16px;
            max-width:400px; width:90%; box-shadow: 0 4px 20px var(--shadow);
            border:1px solid var(--border); color:var(--text);
        }
        .modal-content h2 { margin-bottom:20px; }
        .modal-content input {
            width:100%; padding:10px; margin-bottom:10px; border:1px solid var(--border);
            border-radius:6px; background: var(--input-bg); color:var(--text);
        }
        .modal-content .btn { margin-top:10px; width:100%; }
        .google-btn {
            background: #fff; color: #000; border:1px solid #ccc;
            display:flex; align-items:center; justify-content:center; gap:8px;
            font-weight:500; font-size:0.95rem;
        }
        .google-btn:hover { background: #f1f1f1; }
        .link-btn { background:none; border:none; color:var(--accent); cursor:pointer; text-decoration:underline; margin-top:10px; display:block; width:100%; text-align:center; }

        .chart-container { margin-top:30px; max-width:500px; margin-left:auto; margin-right:auto; }
        canvas { width:100%; }

        @media (max-width:600px) {
            header h1 { font-size:2rem; }
            .stat-card { min-width:140px; padding:10px; }
            .stat-value { font-size:1.5rem; }
            .form-actions { flex-direction:column; }
            .btn { width:100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SubEnd</h1>
            <div class="auth-buttons">
                <button class="auth-btn" id="auth-btn">Войти</button>
                <button class="theme-toggle" id="theme-toggle" title="Переключить тему">
                    <span id="theme-icon">☀️</span> <span id="theme-text">Светлая</span>
                </button>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <main>
            <section class="form-section">
                <h2 id="form-title">Добавить подписку</h2>
                <form id="subscription-form">
                    <input type="hidden" id="sub-id">
                    <div class="form-group">
                        <label for="name">Название</label>
                        <input type="text" id="name" placeholder="Netflix, Spotify..." required>
                    </div>
                    <div class="form-group">
                        <label for="category">Категория</label>
                        <select id="category">
                            <option value="Развлечения">Развлечения</option>
                            <option value="Работа">Работа</option>
                            <option value="Здоровье">Здоровье</option>
                            <option value="Другое">Другое</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cost">Стоимость (₽)</label>
                        <input type="number" id="cost" step="0.01" min="0.01" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <label>Дата следующего списания</label>
                        <div class="date-picker-wrapper" id="date-picker-wrapper">
                            <div class="date-display" id="date-display">
                                <span class="date-text" id="date-text">Выберите дату</span>
                                <button type="button" class="clear-date" id="clear-date">✕</button>
                            </div>
                            <input type="date" id="next_payment_date" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="frequency">Периодичность</label>
                        <select id="frequency" required>
                            <option value="monthly">Ежемесячно</option>
                            <option value="yearly">Ежегодно</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Добавить</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none;">Отмена</button>
                    </div>
                    <div id="form-errors" class="errors"></div>
                </form>
            </section>

            <section class="subscriptions-section">
                <h2>Ваши подписки</h2>
                <div class="subscriptions-grid" id="subscriptions-container"></div>
                <div id="no-subs" class="empty-state"></div>
            </section>

            <section class="history-section">
                <h2>История списаний</h2>
                <div id="history-container"></div>
                <button class="btn-clear-history" id="clear-history" style="display:none;">Очистить историю</button>
            </section>

            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </main>
    </div>

    <!-- Модальное окно авторизации -->
    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <h2 id="auth-title">Вход</h2>
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-password" placeholder="Пароль" required>
            <button class="btn btn-primary" id="auth-submit-btn">Войти</button>
            <button class="btn google-btn" id="google-login-btn">
                <span style="font-size:1.2rem;">G</span> Войти через Google
            </button>
            <button class="link-btn" id="switch-auth-mode">Нет аккаунта? Зарегистрироваться</button>
            <button class="link-btn" id="forgot-password-btn">Забыли пароль?</button>
            <button class="btn btn-secondary" id="close-auth-modal" style="margin-top:10px;">Отмена</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDc8sGzAdQ8rTZTGmA8QCZtpHGW_eKLmA4",
            authDomain: "sunend-c91ed.firebaseapp.com",
            projectId: "sunend-c91ed",
            storageBucket: "sunend-c91ed.firebasestorage.app",
            messagingSenderId: "615953820337",
            appId: "1:615953820337:web:61d4bdd6846bec1f7b1090",
            measurementId: "G-04D53QR7ZN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        // Замените на ваш публичный VAPID-ключ
        const vapidPublicKey = 'BGQcpcKjHKS3YK5kLkZ2i31W_LIssNlk70NUbTdMJX9ow9DZmNHIZw3mDHp3UUPiwWZvmO-JN5YWOVtXHJkbSjA';

        // ---------- Глобальные переменные ----------
        let currentUser = null;
        let subscriptions = [];
        let paymentHistory = [];
        let editingId = null;
        let chartInstance = null;

        // DOM элементы
        const authBtn = document.getElementById('auth-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const form = document.getElementById('subscription-form');
        const subIdInput = document.getElementById('sub-id');
        const nameInput = document.getElementById('name');
        const categorySelect = document.getElementById('category');
        const costInput = document.getElementById('cost');
        const dateInput = document.getElementById('next_payment_date');
        const frequencyInput = document.getElementById('frequency');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const formTitle = document.getElementById('form-title');
        const errorsDiv = document.getElementById('form-errors');
        const statsDiv = document.getElementById('stats');
        const container = document.getElementById('subscriptions-container');
        const noSubsDiv = document.getElementById('no-subs');
        const historyContainer = document.getElementById('history-container');
        const clearHistoryBtn = document.getElementById('clear-history');
        const datePickerWrapper = document.getElementById('date-picker-wrapper');
        const dateDisplay = document.getElementById('date-display');
        const dateText = document.getElementById('date-text');
        const clearDateBtn = document.getElementById('clear-date');

        // Элементы модального окна
        const authModal = document.getElementById('auth-modal');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const switchAuthModeBtn = document.getElementById('switch-auth-mode');
        const forgotPasswordBtn = document.getElementById('forgot-password-btn');
        const closeAuthModalBtn = document.getElementById('close-auth-modal');
        const authTitle = document.getElementById('auth-title');
        const categoryChartCanvas = document.getElementById('categoryChart').getContext('2d');

        let isRegistering = false;

        // ---------- Аутентификация ----------
        function openAuthModal() {
            authModal.classList.add('active');
            authEmail.value = '';
            authPassword.value = '';
            isRegistering = false;
            authTitle.textContent = 'Вход';
            authSubmitBtn.textContent = 'Войти';
            switchAuthModeBtn.textContent = 'Нет аккаунта? Зарегистрироваться';
        }

        function closeAuthModal() {
            authModal.classList.remove('active');
        }

        closeAuthModalBtn.addEventListener('click', closeAuthModal);
        window.addEventListener('click', (e) => {
            if (e.target === authModal) closeAuthModal();
        });

        switchAuthModeBtn.addEventListener('click', () => {
            isRegistering = !isRegistering;
            if (isRegistering) {
                authTitle.textContent = 'Регистрация';
                authSubmitBtn.textContent = 'Зарегистрироваться';
                switchAuthModeBtn.textContent = 'Уже есть аккаунт? Войти';
            } else {
                authTitle.textContent = 'Вход';
                authSubmitBtn.textContent = 'Войти';
                switchAuthModeBtn.textContent = 'Нет аккаунта? Зарегистрироваться';
            }
        });

        forgotPasswordBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            if (!email) {
                alert('Введите email для восстановления');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert('Письмо для сброса пароля отправлено на ' + email);
                closeAuthModal();
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        });

        authSubmitBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            if (!email || !password) {
                alert('Заполните email и пароль');
                return;
            }
            try {
                if (isRegistering) {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                closeAuthModal();
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    alert('Этот email уже зарегистрирован. Войдите или восстановите пароль.');
                } else if (err.code === 'auth/wrong-password') {
                    alert('Неверный пароль');
                } else if (err.code === 'auth/user-not-found') {
                    alert('Пользователь не найден. Зарегистрируйтесь.');
                } else {
                    alert('Ошибка: ' + err.message);
                }
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                closeAuthModal();
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    alert('Ошибка: ' + err.message);
                }
            }
        });

        // Кнопка «Войти» в шапке открывает модалку
        authBtn.addEventListener('click', openAuthModal);

        // Отслеживание состояния аутентификации
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                authBtn.textContent = 'Выйти (' + user.email + ')';
                authBtn.onclick = () => signOut(auth);
                loadUserData(user.uid);
                requestNotificationPermission(user.uid);
            } else {
                authBtn.textContent = 'Войти';
                authBtn.onclick = openAuthModal;
                subscriptions = [];
                paymentHistory = [];
                saveLocal();
                renderAll();
                if (chartInstance) chartInstance.destroy();
            }
        });

        // ---------- Работа с Firestore ----------
        async function loadUserData(uid) {
            const userDocRef = doc(db, 'users', uid);
            const docSnap = await getDoc(userDocRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                subscriptions = data.subscriptions || [];
                paymentHistory = data.paymentHistory || [];
            } else {
                const localSubs = JSON.parse(localStorage.getItem('subscriptions') || '[]');
                const localHist = JSON.parse(localStorage.getItem('paymentHistory') || '[]');
                subscriptions = localSubs;
                paymentHistory = localHist;
                if (localSubs.length || localHist.length) {
                    await saveToFirestore(uid);
                    localStorage.removeItem('subscriptions');
                    localStorage.removeItem('paymentHistory');
                }
            }
            saveLocal();
            renderAll();
            onSnapshot(userDocRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    subscriptions = data.subscriptions || [];
                    paymentHistory = data.paymentHistory || [];
                    saveLocal();
                    renderAll();
                }
            });
        }

        async function saveToFirestore(uid) {
            if (!uid) return;
            const userDocRef = doc(db, 'users', uid);
            await setDoc(userDocRef, {
                subscriptions: subscriptions,
                paymentHistory: paymentHistory
            }, { merge: true });
        }

        function saveLocal() {
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            localStorage.setItem('paymentHistory', JSON.stringify(paymentHistory));
        }

        // ---------- Push-уведомления ----------
        async function requestNotificationPermission(uid) {
            if (!('Notification' in window)) return;
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                try {
                    const currentToken = await getToken(messaging, { vapidKey: vapidPublicKey });
                    if (currentToken) {
                        const userDocRef = doc(db, 'users', uid);
                        await setDoc(userDocRef, { fcmToken: currentToken }, { merge: true });
                    }
                } catch (err) {
                    console.log('Не удалось получить FCM токен', err);
                }
            }
        }

        onMessage(messaging, (payload) => {
            const { title, body } = payload.notification;
            new Notification(title, { body, icon: '/icon.png' });
        });

        // ---------- Утилиты ----------
        function formatRub(amount) {
            return Math.round(amount).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽';
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // ---------- Статистика ----------
        function updateStats() {
            let monthlyTotal = 0, yearlyTotal = 0;
            subscriptions.forEach(sub => {
                const cost = parseFloat(sub.cost);
                if (sub.frequency === 'monthly') {
                    monthlyTotal += cost;
                    yearlyTotal += cost * 12;
                } else {
                    yearlyTotal += cost;
                }
            });
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <span class="stat-label">Расходы в месяц</span>
                    <span class="stat-value">${formatRub(monthlyTotal)}</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Расходы в год</span>
                    <span class="stat-value">${formatRub(yearlyTotal)}</span>
                </div>
            `;
        }

        // ---------- Даты ----------
        function getDaysLeft(dateStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(dateStr + 'T00:00:00');
            return Math.ceil((due - today) / (1000*60*60*24));
        }

        function formatDaysLeft(dateStr) {
            const days = getDaysLeft(dateStr);
            if (days < 0) return '<span class="days-left">Просрочено</span>';
            if (days === 0) return '<span class="days-left today">Сегодня</span>';
            if (days === 1) return '<span class="days-left soon">Завтра</span>';
            if (days <= 3) return `<span class="days-left soon">через ${days} дня</span>`;
            return `<span class="days-left">через ${days} дней</span>`;
        }

        function formatDate(dateStr) {
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('ru-RU', {year:'numeric', month:'long', day:'numeric'});
        }

        function updateDateDisplay() {
            const val = dateInput.value;
            if (val) {
                dateText.textContent = formatDate(val);
                dateText.classList.add('selected');
                clearDateBtn.classList.add('visible');
                dateDisplay.classList.add('active');
            } else {
                dateText.textContent = 'Выберите дату';
                dateText.classList.remove('selected');
                clearDateBtn.classList.remove('visible');
                dateDisplay.classList.remove('active');
            }
        }

        function openDatePicker() {
            if (typeof dateInput.showPicker === 'function') {
                dateInput.showPicker();
            } else {
                dateInput.style.position = 'static'; dateInput.style.opacity = '1'; dateInput.style.width = '100%'; dateInput.style.height = 'auto'; dateInput.style.pointerEvents = 'auto';
                dateInput.focus(); dateInput.click();
                setTimeout(() => {
                    dateInput.style.position = 'absolute'; dateInput.style.opacity = '0'; dateInput.style.width = '100%'; dateInput.style.height = '100%'; dateInput.style.pointerEvents = 'auto';
                }, 100);
            }
        }

        datePickerWrapper.addEventListener('click', (e) => { if (e.target !== clearDateBtn) openDatePicker(); });
        clearDateBtn.addEventListener('click', (e) => { e.stopPropagation(); dateInput.value = ''; updateDateDisplay(); });
        dateInput.addEventListener('change', updateDateDisplay);

        // ---------- Тема ----------
        function applyTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme'); themeIcon.textContent = '🌙'; themeText.textContent = 'Тёмная';
            } else {
                document.body.classList.remove('light-theme'); themeIcon.textContent = '☀️'; themeText.textContent = 'Светлая';
            }
            localStorage.setItem('theme', theme);
        }
        themeToggle.addEventListener('click', () => applyTheme(document.body.classList.contains('light-theme') ? 'dark' : 'light'));
        applyTheme(localStorage.getItem('theme') || 'dark');

        // ---------- История ----------
        function addPaymentRecord(name, cost) {
            paymentHistory.unshift({ id: generateId(), name, cost, date: new Date().toISOString().split('T')[0] });
            if (paymentHistory.length > 100) paymentHistory.pop();
            saveLocal();
            if (currentUser) saveToFirestore(currentUser.uid);
            renderHistory();
            updateChart();
        }

        function renderHistory() {
            if (!paymentHistory.length) {
                historyContainer.innerHTML = '<table class="history-list"><tr><td class="empty-history" colspan="3">История пуста</td></tr></table>';
                clearHistoryBtn.style.display = 'none';
                return;
            }
            clearHistoryBtn.style.display = 'inline-block';
            historyContainer.innerHTML = `
                <table class="history-list">
                    <thead><tr><th>Название</th><th>Сумма</th><th>Дата списания</th></tr></thead>
                    <tbody>${paymentHistory.map(r => `<tr><td>${escapeHtml(r.name)}</td><td>${formatRub(parseFloat(r.cost))}</td><td>${formatDate(r.date)}</td></tr>`).join('')}</tbody>
                </table>
            `;
        }

        clearHistoryBtn.addEventListener('click', () => {
            if (!confirm('Очистить историю?')) return;
            paymentHistory = [];
            saveLocal();
            if (currentUser) saveToFirestore(currentUser.uid);
            renderHistory();
        });

        function recalcNextDate(dateStr, freq) {
            const d = new Date(dateStr + 'T00:00:00');
            if (freq === 'monthly') d.setMonth(d.getMonth() + 1); else d.setFullYear(d.getFullYear() + 1);
            const today = new Date(); today.setHours(0,0,0,0);
            while (d < today) { if (freq === 'monthly') d.setMonth(d.getMonth() + 1); else d.setFullYear(d.getFullYear() + 1); }
            return d.toISOString().split('T')[0];
        }

        function markAsPaid(id) {
            const sub = subscriptions.find(s => s.id === id);
            if (!sub) return;
            if (!confirm(`Отметить "${sub.name}" как оплаченный?`)) return;
            addPaymentRecord(sub.name, sub.cost);
            sub.next_payment_date = recalcNextDate(sub.next_payment_date, sub.frequency);
            saveLocal();
            if (currentUser) saveToFirestore(currentUser.uid);
            renderAll();
        }

        // ---------- Подписки ----------
        function escapeHtml(text) {
            const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
        }

        function renderSubscriptions() {
            container.innerHTML = '';
            if (!subscriptions.length) {
                noSubsDiv.style.display = 'block';
                noSubsDiv.innerHTML = '<p>У вас пока нет подписок. Добавьте первую!</p>';
                updateStats();
                return;
            }
            noSubsDiv.style.display = 'none';
            subscriptions.forEach(sub => {
                const days = getDaysLeft(sub.next_payment_date);
                const near = days >=0 && days <=3;
                const card = document.createElement('div');
                card.className = `subscription-card ${near ? 'near-warning' : ''}`;
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${escapeHtml(sub.name)}</h3>
                        <div>
                            <span class="category-badge">${sub.category || 'Другое'}</span>
                            <span class="frequency-badge">${sub.frequency === 'monthly' ? 'Ежемесячно' : 'Ежегодно'}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <p class="cost">${formatRub(parseFloat(sub.cost))}</p>
                        <p class="next-date">
                            Следующее списание: ${formatDate(sub.next_payment_date)}
                            ${formatDaysLeft(sub.next_payment_date)}
                        </p>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-sm btn-paid" data-id="${sub.id}">Оплачено</button>
                        <button class="btn btn-sm btn-edit" data-id="${sub.id}">Редактировать</button>
                        <button class="btn btn-sm btn-delete" data-id="${sub.id}">Удалить</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.btn-paid').forEach(b => b.addEventListener('click', () => markAsPaid(b.dataset.id)));
            document.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', () => editSubscription(b.dataset.id)));
            document.querySelectorAll('.btn-delete').forEach(b => b.addEventListener('click', () => deleteSubscription(b.dataset.id)));
            updateStats();
        }

        function resetForm() {
            form.reset();
            subIdInput.value = ''; editingId = null;
            formTitle.textContent = 'Добавить подписку'; submitBtn.textContent = 'Добавить';
            cancelBtn.style.display = 'none'; errorsDiv.innerHTML = '';
            dateInput.value = ''; updateDateDisplay();
        }

        function editSubscription(id) {
            const sub = subscriptions.find(s => s.id === id);
            if (!sub) return;
            subIdInput.value = sub.id;
            nameInput.value = sub.name;
            categorySelect.value = sub.category || 'Другое';
            costInput.value = sub.cost;
            dateInput.value = sub.next_payment_date;
            frequencyInput.value = sub.frequency;
            editingId = id;
            formTitle.textContent = 'Редактировать подписку'; submitBtn.textContent = 'Сохранить';
            cancelBtn.style.display = 'inline-block'; errorsDiv.innerHTML = '';
            updateDateDisplay();
            window.scrollTo({ top: form.offsetTop - 20, behavior: 'smooth' });
        }

        function deleteSubscription(id) {
            if (!confirm('Удалить подписку?')) return;
            subscriptions = subscriptions.filter(s => s.id !== id);
            saveLocal();
            if (currentUser) saveToFirestore(currentUser.uid);
            renderAll();
            if (editingId === id) resetForm();
        }

        function validateForm(name, cost, dateStr, freq) {
            const errors = [];
            if (!name.trim()) errors.push('Название обязательно');
            if (cost === '' || isNaN(cost) || parseFloat(cost) <= 0) errors.push('Стоимость должна быть положительным числом');
            if (!dateStr) errors.push('Дата обязательна');
            if (freq !== 'monthly' && freq !== 'yearly') errors.push('Периодичность неверна');
            return errors;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorsDiv.innerHTML = '';
            const name = nameInput.value.trim();
            const cost = costInput.value.trim();
            const dateStr = dateInput.value;
            const frequency = frequencyInput.value;
            const category = categorySelect.value;
            const errors = validateForm(name, cost, dateStr, frequency);
            if (errors.length) {
                errorsDiv.innerHTML = errors.map(e => `<p>${e}</p>`).join('');
                return;
            }
            if (editingId) {
                const sub = subscriptions.find(s => s.id === editingId);
                if (sub) {
                    sub.name = name; sub.cost = parseFloat(cost).toFixed(2);
                    sub.category = category; sub.next_payment_date = dateStr; sub.frequency = frequency;
                }
            } else {
                subscriptions.push({
                    id: generateId(), name, cost: parseFloat(cost).toFixed(2), category,
                    next_payment_date: dateStr, frequency
                });
            }
            saveLocal();
            if (currentUser) await saveToFirestore(currentUser.uid);
            renderAll();
            resetForm();
        });

        cancelBtn.addEventListener('click', resetForm);

        // ---------- График ----------
        function updateChart() {
            if (!subscriptions.length) {
                if (chartInstance) chartInstance.destroy();
                return;
            }
            const categories = {};
            subscriptions.forEach(sub => {
                const cat = sub.category || 'Другое';
                const cost = parseFloat(sub.cost);
                categories[cat] = (categories[cat] || 0) + cost;
            });
            const labels = Object.keys(categories);
            const data = Object.values(categories);

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(categoryChartCanvas, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#00d4aa','#ff9f43','#ff6b6b','#a0c4ff','#b19cd9','#f0b27a'],
                        borderColor: 'var(--surface)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: 'var(--text-secondary)' } }
                    }
                }
            });
        }

        function renderAll() {
            renderSubscriptions();
            renderHistory();
            updateChart();
        }

        // Первоначальная отрисовка
        renderAll();
        updateDateDisplay();
    </script>
</body>
</html>
